<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CartBaba 🛒</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        text-align: center;
        margin: 0;
        padding: 0;
      }

      h1 {
        margin-top: 30px;
      }

      .search-box {
        margin: 20px;
      }

      input {
        padding: 10px;
        width: 300px;
        border-radius: 8px;
        border: 1px solid #ccc;
      }

      button {
        padding: 10px 15px;
        border: none;
        background: black;
        color: white;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #333;
      }

      #ai-output {
        margin: 20px auto;
        width: 60%;
        background: white;
        padding: 15px;
        border-radius: 10px;
        text-align: left;
        box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.1);
      }

      #results {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        padding: 20px;
        width: 80%;
        margin: auto;
      }

      .card {
        background: white;
        padding: 15px;
        border-radius: 12px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s;
      }

      .card:hover {
        transform: scale(1.03);
      }

      .card h3 {
        margin: 10px 0;
      }

      .price {
        font-weight: bold;
        color: green;
      }

      .rating {
        color: #ff9800;
      }

      .score {
        font-size: 12px;
        color: gray;
      }

      .loading {
        font-size: 18px;
        margin-top: 20px;
      }
    </style>
  </head>

  <body>
    <h1>🛒 CartBaba</h1>

    <div class="search-box">
      <input id="searchInput" placeholder="e.g. shoes under 5000" />
      <button onclick="searchProducts()">Search</button>
    </div>

    <div id="ai-output"></div>

    <div id="results"></div>

    <div id="loading" class="loading"></div>

    <script>
      async function searchProducts() {
        const query = document.getElementById("searchInput").value;

        if (!query) return;

        document.getElementById("loading").innerText = "Loading...";
        document.getElementById("results").innerHTML = "";
        document.getElementById("ai-output").innerHTML = "";

        try {
          const res = await fetch(
            `http://127.0.0.1:8000/search/?query=${query}`,
            {
              method: "POST",
            },
          );

          const data = await res.json();

          console.log("API Response:", data);

          displayProducts(data.products);
          displayAI(data.final);
        } catch (err) {
          console.error(err);
          document.getElementById("loading").innerText = "Error fetching data";
        }

        document.getElementById("loading").innerText = "";
      }

      function displayProducts(products) {
        const container = document.getElementById("results");

        if (!products || products.length === 0) {
          container.innerHTML = "<p>No products found</p>";
          return;
        }

        products.forEach((p) => {
          const div = document.createElement("div");
          div.className = "card";

          div.innerHTML = `
  <img src="${p.image}" style="width:100%; height:180px; object-fit:cover; border-radius:10px;">
  <h3>${p.name}</h3>
  <p class="price">₹${p.price}</p>
  <p class="rating">⭐ ${p.rating}</p>
  <p class="score">Score: ${p.score?.toFixed(2)}</p>
`;

          container.appendChild(div);
        });
      }

      function displayAI(text) {
        const box = document.getElementById("ai-output");

        if (!text) return;

        box.innerHTML = `
        <h3>🤖 AI Recommendation</h3>
        <p>${text}</p>
      `;
      }
    </script>
  </body>
</html>
